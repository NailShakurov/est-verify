domain: est.com.kz
course_name: "Евразийская школа трекинга"   # входит в подписанный payload
course_code: "E"                             # используется при --compact
compact_course: false                        # true → в QR короткий код вместо названия

template_pdf: ./input/template.pdf
table_path: ./input/students.xlsx
output_dir: ./output
font_path: /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf   # кириллический TTF; переопределить под свою машину

keys:
  private: ./keys/ed25519_private.key   # ТОЛЬКО локально, на сервер заказчика не копировать
  public:  ./keys/ed25519_public.key

columns:            # маппинг наших полей на заголовки в таблице заказчика
  fio: "Фамилия Имя"
  date: "Дата"
  number: "Номер сертификата"
  # остальные колонки таблицы («№», «Кем выдан» и т.п.) не читаются — здесь мапятся только эти три поля

placement:          # координаты на шаблоне (точки PDF, начало — верхний левый угол)
  # ФИО — центрировано по полоске (x=59..767, над y=491)
  fio:
    rect: [59, 430, 767, 487]        # insert_textbox, align=center
    fontsize: 32
    font: DejaVuSans
    color: [0.1, 0.1, 0.5]

  # Дата
  date:
    x: 120
    y: 828
    fontsize: 15
    font: DejaVuSans
    color: [0, 0, 0]

  # Номер сертификата
  cert_num:
    x: 400
    y: 960
    fontsize: 13
    font: DejaVuSans
    color: [0.3, 0.3, 0.3]

  # QR-код
  qr:
    x: 570
    y: 800
    size: 180                        # pt (~6.3 см)

  # Домен под QR
  verify_label:
    x: 570
    y: 994
    fontsize: 15
    font: DejaVuSans
    color: [0.2, 0.2, 0.6]
